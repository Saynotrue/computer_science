<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBO 직관 마스터</title>

    <script type="text/javascript"
        src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=ljz64mj8ck&callback=initMap"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <div class="header">
            <h1>⚾ KBO 직관 마스터</h1>
            <div id="authArea" style="margin-top: 10px;"></div>
        </div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('winRate')">직관 승률 계산기</div>
            <div class="tab" onclick="switchTab('foodStamp')">맛집 리스트</div>
        </div>

        <div id="winRate" class="content active">
            <div class="dashboard">
                <div>나의 누적 직관 승률</div>
                <div class="win-rate-text" id="winRateScore">0%</div>
                <div class="title-badge" id="fairyTitle">측정 중...</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="winProgressBar"></div>
                </div>
            </div>

            <form id="gameForm">
                <input type="date" id="gDate" required>

                <select id="gMatch" required style="width: 200px;">
                    <option value="">날짜를 먼저 선택하세요</option>
                </select>

                <select id="gResult" required>
                    <option value="win">승리</option>
                    <option value="lose">패배</option>
                    <option value="draw">무승부</option>
                    <option value="cancel">취소</option>
                </select>
                <button type="submit">기록</button>
            </form>
            <div id="gameList"></div>
        </div>

        <div id="foodStamp" class="content">
            <select class="stadium-filter" id="stadiumSelect" onchange="renderFoods()">
                <option value="전체">전체 구장 보기</option>
                <option value="잠실">잠실 야구장</option>
                <option value="수원">수원 KT위즈파크</option>
                <option value="대전">대전 이글스파크</option>
                <option value="대구">대구 삼성라이온즈파크</option>
                <option value="광주">광주 기아챔피언스필드</option>
                <option value="부산">부산 사직야구장</option>
                <option value="인천">인천 SSG랜더스필드</option>
                <option value="고척">고척 스카이돔</option>
                <option value="창원">창원 NC파크</option>
            </select>

            <div class="add-food-form">
                <select id="newFoodStadium">
                    <option value="잠실">잠실 야구장</option>
                    <option value="수원">수원 KT위즈파크</option>
                    <option value="대전">대전 이글스파크</option>
                    <option value="대구">대구 삼성라이온즈파크</option>
                    <option value="광주">광주 기아챔피언스필드</option>
                    <option value="부산">부산 사직야구장</option>
                    <option value="인천">인천 SSG랜더스필드</option>
                    <option value="고척">고척 스카이돔</option>
                    <option value="창원">창원 NC파크</option>
                </select>
                <input type="text" id="newFoodName" placeholder="나만의 비밀 맛집 추가!">
                <button onclick="addMyFood()">추가</button>
            </div>

            <div id="map"></div>

            <div id="foodList"></div>

        </div>
    </div>
    <script src="app.js"></script>

    <div id="settingsModal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div
            style="background: white; padding: 20px; border-radius: 10px; width: 300px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin-top: 0;">⚙️ 사용자 설정</h3>
            <p style="font-size: 14px; color: #555;">나의 응원팀을 선택해주세요!</p>

            <select id="teamSelect"
                style="padding: 8px; width: 80%; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc;">
                <option value="미지정">선택 안함</option>
                <option value="LG">LG 트윈스</option>
                <option value="KT">KT 위즈</option>
                <option value="SSG">SSG 랜더스</option>
                <option value="NC">NC 다이노스</option>
                <option value="두산">두산 베어스</option>
                <option value="KIA">KIA 타이거즈</option>
                <option value="롯데">롯데 자이언츠</option>
                <option value="삼성">삼성 라이온즈</option>
                <option value="한화">한화 이글스</option>
                <option value="키움">키움 히어로즈</option>
            </select>
            <br>

            <button onclick="saveTeam()"
                style="background:var(--kbo-light-blue); color:white; border:none; padding:8px 20px; border-radius:5px; cursor:pointer; font-weight: bold;">저장</button>
            <button onclick="closeSettings()"
                style="background:#e2e8f0; color:#333; border:none; padding:8px 20px; border-radius:5px; cursor:pointer; margin-left: 10px;">닫기</button>
        </div>
    </div>
</body>

</html>
